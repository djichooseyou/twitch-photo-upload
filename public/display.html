<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Fan Photo Display</title>

<style>

body{
  background:black;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Portrait frame */

.photo-frame{
  width:260px;
  height:460px;
  border-radius:22px;
  padding:6px;
  background:linear-gradient(135deg,#ffffff,#bbbbbb);
  box-shadow:0 0 30px rgba(255,255,255,0.35);
}

/* Inner container */

.photo-inner{
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:18px;
  background:black;
}

.photo-inner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

</style>

</head>

<body>

<div class="photo-frame">
  <div class="photo-inner">
    <img id="fanphoto" src="/latest.jpg">
  </div>
</div>

<script>

setInterval(()=>{
 document.getElementById("fanphoto").src="/latest.jpg?"+new Date().getTime();
},3000);

</script>

</body>

</html>

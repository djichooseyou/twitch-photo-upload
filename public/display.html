<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Fan Photo Display</title>

<style>

body{
background:black;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

.photo-frame{
width:420px;
height:740px;
border-radius:22px;
background:linear-gradient(135deg,#ffffff,#bbbbbb);
box-shadow:0 0 30px rgba(255,255,255,0.35);
display:flex;
flex-direction:column;
overflow:hidden;
}

.frame-title{
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:3px;
padding:14px 0;
background:#000;
color:white;
border-bottom:2px solid #ffffff;
text-shadow:0 0 12px rgba(255,255,255,0.9);
}

.photo-inner{
flex:1;
background:black;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.photo-inner img{
width:100%;
height:100%;
object-fit:contain;
}

.username{
text-align:center;
font-size:40px;
margin-top:14px;
font-weight:bold;
text-shadow:0 0 12px rgba(255,255,255,0.8);
}

.message{
text-align:center;
font-size:28px;
opacity:0.9;
padding-bottom:16px;
padding-left:10px;
padding-right:10px;
word-wrap:break-word;
}

</style>

</head>

<body>

<div class="photo-frame">

<div class="frame-title">
OSF PHOTO WALL
</div>

<div class="photo-inner">
<img id="fanphoto">
</div>

<div class="username" id="username"></div>
<div class="message" id="message"></div>

</div>

<script>

const API_BASE = "https://twitch-photo-upload.onrender.com";

let photos = [];
let index = 0;

async function loadPhotos(){
 try {
  const res = await fetch(API_BASE + "/approved-list");
  photos = await res.json();
 } catch (err){
  console.log("Error loading photos", err);
 }
}

function parseFile(file){

 const clean = file.substring(0, file.lastIndexOf("."));
 const parts = clean.split("__");

 return {
  username: parts[1] || "anon",
  message: parts[2] || ""
 };
}

function showNext(){

 if(!photos.length) return;

 const file = photos[index];

 document.getElementById("fanphoto").src =
 API_BASE + "/approved/" + encodeURIComponent(file) + "?" + Date.now();

 const data = parseFile(file);

// ✅ decode values (THIS is what fixes #, emojis, etc.)
const cleanUsername = decodeURIComponent(data.username);
const cleanMessage = decodeURIComponent(data.message);

document.getElementById("username").innerText = "@" + cleanUsername;
document.getElementById("message").innerText = cleanMessage;

 index++;

 if(index >= photos.length){
  index = 0;
 }
}

setInterval(loadPhotos,4000);
setInterval(showNext,8000);

loadPhotos();

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Fan Photo Display</title>

<style>

body{
background:black;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

/* Photo Frame */

.photo-frame{
width:420px;
height:740px;
border-radius:22px;
background:linear-gradient(135deg,#ffffff,#bbbbbb);
box-shadow:0 0 30px rgba(255,255,255,0.35);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* Title */

.frame-title{
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:3px;
padding:14px 0;
background:#000;
color:white;
border-bottom:2px solid #ffffff;
text-shadow:0 0 12px rgba(255,255,255,0.9);
}

/* Photo Area */

.photo-inner{
flex:1;
background:black;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.photo-inner img{
width:100%;
height:100%;
object-fit:contain;
}

/* Username */

.username{
text-align:center;
font-size:40px;
margin-top:14px;
font-weight:bold;
text-shadow:0 0 12px rgba(255,255,255,0.8);
}

/* Message */

.message{
text-align:center;
font-size:28px;
opacity:0.9;
padding-bottom:16px;
}

</style>

</head>

<body>

<div class="photo-frame">

<div class="frame-title">
ICU PHOTO WALL
</div>

<div class="photo-inner">
<img id="fanphoto">
</div>

<div class="username" id="username"></div>
<div class="message" id="message"></div>

</div>

<script>

let photos = [];
let index = 0;

/* Load approved photos */

async function loadPhotos(){

 const res = await fetch("/approved");
 photos = await res.json();

}

/* Rotate photos */

function showNext(){

 if(!photos.length) return;

 const file = photos[index];

 document.getElementById("fanphoto").src =
 "/approved/"+file+"?"+Date.now();

 const parts = file.split("__");

 const username = parts[0] || "";
 const message = parts[1] || "";

 document.getElementById("username").innerText = "@"+username;
 document.getElementById("message").innerText =
 message.replaceAll("_"," ");

 index++;

 if(index >= photos.length){
  index = 0;
 }

}

/* refresh photo list */

setInterval(loadPhotos,4000);

/* rotate images */

setInterval(showNext,8000);

loadPhotos();

</script>

</body>

</html>

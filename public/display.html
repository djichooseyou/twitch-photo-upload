<!DOCTYPE html>
<html>

<head>

<style>

body{
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
font-family:Arial;
overflow:hidden;
}

#title{
font-size:50px;
letter-spacing:4px;
margin-bottom:20px;
opacity:.9;
}

#waiting{
font-size:36px;
opacity:.6;
}

img{
max-width:90%;
max-height:70%;
border:6px solid white;
border-radius:12px;
box-shadow:0 0 40px rgba(255,255,255,0.5);
display:none;
transform:translateX(120%);
transition:transform .7s ease, opacity .7s ease;
opacity:0;
}

img.show{
transform:translateX(0);
opacity:1;
}

#username{
margin-top:30px;
font-size:64px;
font-weight:bold;
background:rgba(0,0,0,.6);
padding:10px 25px;
border-radius:10px;
text-shadow:0 0 20px rgba(255,255,255,.9);
}

</style>

</head>

<body>

<div id="title">FAN SHOUTOUT</div>

<div id="waiting">Waiting for fan photos...</div>

<img id="photo">

<div id="username"></div>

<script>

let photos = [];
let index = 0;
let lastSeen = 0;
let alertQueue = [];

async function loadPhotos(){

 const res = await fetch("/approved");
 const newPhotos = await res.json();

 if(newPhotos.length > lastSeen){

  const newOnes = newPhotos.slice(lastSeen);

  alertQueue.push(...newOnes);

 }

 lastSeen = newPhotos.length;

 photos = newPhotos;

 if(photos.length > 0){
  document.getElementById("waiting").style.display="none";
 }

}

function showAlert(file){

 const img = document.getElementById("photo");
 const user = document.getElementById("username");

 const name = file.includes("_") ? file.split("_")[0] : "Fan";

 img.src="/approved/"+file+"?"+Date.now();

 user.innerText=name;

 img.style.display="block";

 img.classList.remove("show");

 setTimeout(()=>{
  img.classList.add("show");
 },50);

}

function showNext(){

 if(alertQueue.length > 0){

  const alertPhoto = alertQueue.shift();

  showAlert(alertPhoto);

  return;

 }

 if(photos.length === 0) return;

 const img = document.getElementById("photo");
 const user = document.getElementById("username");

 const file = photos[index];

 const name = file.includes("_") ? file.split("_")[0] : "Fan";

 img.src="/approved/"+file+"?"+Date.now();

 user.innerText=name;

 img.style.display="block";

 img.classList.add("show");

 index++;

 if(index >= photos.length){
  index = 0;
 }

}

setInterval(showNext,8000);
setInterval(loadPhotos,3000);

loadPhotos();

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<style>

body{
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
font-family:Arial;
}

#waiting{
font-size:36px;
opacity:.6;
}

img{
max-width:90%;
max-height:70%;
border:6px solid white;
border-radius:12px;
box-shadow:0 0 40px rgba(255,255,255,0.5);
display:none;
}

#username{
margin-top:30px;
font-size:64px;
font-weight:bold;
background:rgba(0,0,0,.6);
padding:10px 25px;
border-radius:10px;
text-shadow:0 0 20px rgba(255,255,255,.9);
}

</style>

</head>

<body>

<div id="waiting">Waiting for fan photos...</div>

<img id="photo">

<div id="username"></div>

<script>

let photos = [];
let index = 0;

async function loadPhotos(){

 const res = await fetch("/approved");
 const newPhotos = await res.json();

 if(newPhotos.length !== photos.length){
  index = 0;
 }

 photos = newPhotos;

 if(photos.length > 0){

  document.getElementById("waiting").style.display = "none";

  showNext();

 }

}

function showNext(){

 if(photos.length === 0) return;

 const img = document.getElementById("photo");
 const user = document.getElementById("username");

 const file = photos[index];

 img.style.display = "block";

 img.src = "/approved/" + file + "?" + Date.now();

 const name = file.includes("_") ? file.split("_")[0] : "Fan";

 user.innerText = name;

 index++;

 if(index >= photos.length){
  index = 0;
 }

}

/* rotate photos every 8 seconds */
setInterval(showNext,8000);

/* check for new approved photos */
setInterval(loadPhotos,4000);

/* initial load */
loadPhotos();

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSF Photo Wall</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      text-align: center;
      font-size: 48px;
      padding: 20px 0;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px white;
      border-bottom: 2px solid white;
    }

    .wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      width: 90%;
      padding: 40px 0;
    }

    .card {
      background: #111;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 15px;
    }

    .photo {
      width: 100%;
      height: auto;
      display: block;
    }

    .info {
      margin-top: 10px;
      text-align: center;
      padding: 10px;
    }

    .username {
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .message {
      font-size: 16px;
      color: #ccc;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="header">OSF PHOTO WALL</div>

  <div class="wall" id="wall"></div>

  <script>
    async function loadPhotos() {
      try {
        const res = await fetch('/photos');
        const files = await res.json();

        const wall = document.getElementById('wall');
        wall.innerHTML = '';

        files.reverse().forEach(file => {
          const rawName = file.replace('.png', '').replace('.jpg', '').replace('.jpeg', '');

          // Split filename format: timestamp_username message
          let username = 'unknown';
          let message = '';

          if (rawName.includes('_')) {
            const parts = rawName.split('_');
            const rest = parts.slice(1).join('_');

            const splitRest = rest.split(' ');
            username = splitRest[0];
            message = splitRest.slice(1).join(' ');
          }

          const card = document.createElement('div');
          card.className = 'card';

          card.innerHTML = `
            <img src="/uploads/${file}" class="photo" />
            <div class="info">
              <div class="username">@${username}</div>
              <div class="message">${message}</div>
            </div>
          `;

          wall.appendChild(card);
        });
      } catch (err) {
        console.error('Error loading photos:', err);
      }
    }

    // Auto refresh every 5 seconds
    setInterval(loadPhotos, 5000);
    loadPhotos();
  </script>
</body>
</html>

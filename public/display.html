<!DOCTYPE html>
<html>

<head>

<style>

body{
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
font-family:Arial;
}

img{
max-width:90%;
max-height:90%;
border:6px solid white;
border-radius:12px;
box-shadow:0 0 40px rgba(255,255,255,0.5);
}
#username{
margin-top:20px;
font-size:36px;
font-weight:bold;
text-shadow:0 0 15px rgba(255,255,255,.8);
}
</style>

</head>

<body>

<div id="waiting">Waiting for fan photos...</div>

<img id="photo" style="display:none">

<div id="username"></div>

<script>

let photos=[];
let index=0;

async function loadPhotos(){

 const res=await fetch("/approved");
 photos=await res.json();

 if(photos.length > 0){
  document.getElementById("waiting").style.display="none";
 }

}

function showNext(){

 if(photos.length===0) return;

 const img=document.getElementById("photo");
 const user=document.getElementById("username");

 const file=photos[index];

 img.style.display="block";

 img.src="/approved/"+file+"?"+Date.now();

 const name=file.split("_")[0];

 user.innerText=name;

 index++;

 if(index>=photos.length){
  index=0;
 }

}

setInterval(showNext,8000);

loadPhotos();
setInterval(loadPhotos,6000);

</script>

</body>

</html>

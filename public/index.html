<!DOCTYPE html>
<html>
<head>
  <title>DJICHOOSEYOU LIVE</title>
  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 90px;
      font-size: 48px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    h2 {
      margin-top: 10px;
      margin-bottom: 30px;
      font-weight: normal;
      color: #ddd;
      font-size: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 35px 30px;
      border-radius: 15px;
      width: 360px;
      margin: auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-size: 16px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      background: #e6e6e6;
      color: #000;
    }

    input[type="file"] {
      margin-top: 10px;
      margin-bottom: 20px;
    }

    button {
      background: #ff0055;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
    }

    .small {
      margin-top: 15px;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>

<h1>DJICHOOSEYOU LIVE</h1>
<h2>Upload Your Photo To The Stream</h2>

<div class="card">

  <form id="uploadForm" enctype="multipart/form-data">

    <label>Your Name or Twitch Username</label>
    <input type="text" name="name" placeholder="Enter your name" required>

    <label>Message for the stream (optional)</label>
    <input type="text" name="message" placeholder="Say something!">

    <label>Select Photo</label>
    <input type="file" name="photo" required>

    <button type="submit">Upload Photo</button>

  </form>

  <div class="small">Your photo may appear live on the stream!</div>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData(form);
  const button = form.querySelector("button");

  button.disabled = true;
  button.innerText = "Uploading...";

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      button.innerText = "Uploaded!";
      form.reset();

      setTimeout(() => {
        button.innerText = "Upload Photo";
        button.disabled = false;
      }, 2000);
    } else {
      button.innerText = "Failed";
      button.disabled = false;
    }

  } catch (err) {
    button.innerText = "Error";
    button.disabled = false;
  }
});
</script>

</body>
</html>

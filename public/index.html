<!DOCTYPE html>
<html>
<head>
<title>DJICHOOSEYOU Fan Photo Upload</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:50px;
}

.upload-box{
background:#222;
padding:30px;
border-radius:10px;
width:350px;
margin:auto;
}

button{
background:#ff0055;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff3377;
}
</style>

</head>

<body>

<h1>DJICHOOSEYOU LIVE</h1>
<h3>Upload Your Photo To The Stream</h3>

<div class="upload-box">

<form action="/upload" method="post" enctype="multipart/form-data">

<label>Your Name or Twitch Username</label>

<br><br>

<input type="text" name="username" placeholder="Enter your name" required>

<br><br>

<input type="file" name="photo" accept="image/*" required>

<br><br>

<button type="submit">Upload Photo</button>

</form>

</div>

</body>
</html>

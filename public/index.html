<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DJICHOOSEYOU LIVE</title>

<style>

body{
background:black;
margin:0;
font-family:Arial;
color:white;
text-align:center;
}

/* 🔥 Smaller title */
h1{
margin-top:30px;
font-size:42px;
letter-spacing:2px;
}

.subtitle{
font-size:20px;
margin-bottom:25px;
opacity:0.8;
}

/* 🔥 Smaller container */
.container{
width:360px;
margin:auto;
padding:25px;
border-radius:16px;
background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
box-shadow:0 0 20px rgba(255,255,255,0.12);
}

/* 🔥 Tighter spacing */
label{
display:block;
margin-top:14px;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:none;
font-size:14px;
}

/* 🔥 Smaller button */
button{
margin-top:18px;
padding:12px 28px;
border:none;
border-radius:10px;
background:#ff0055;
color:white;
font-size:16px;
cursor:pointer;
}

button.success{
background:green;
}

button.error{
background:red;
}

.note{
margin-top:14px;
opacity:0.6;
font-size:13px;
}

</style>

</head>

<body>

<h1>DJICHOOSEYOU LIVE</h1>
<div class="subtitle">Upload Your Photo To The Stream</div>

<div class="container">

<form id="uploadForm">

<label>Your Name or Twitch Username</label>
<input name="username" required>

<label>Message for the stream (optional)</label>
<input name="message">

<label>Select Photo</label>
<input type="file" name="photo" accept="image/*" required>

<button type="submit" id="submitBtn">Upload</button>

</form>

<div class="note">Your photo may appear live on the stream!</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

 const API_BASE = "https://twitch-photo-upload.onrender.com";

 const form = document.getElementById("uploadForm");
 const btn = document.getElementById("submitBtn");

 form.addEventListener("submit", async (e) => {
  e.preventDefault();

  btn.innerText = "Uploading...";
  btn.classList.remove("error","success");

  const formData = new FormData(form);

  try {

   const res = await fetch(API_BASE + "/upload", {
     method: "POST",
     body: formData
   });

   if(res.ok){
     btn.innerText = "Uploaded!";
     btn.classList.add("success");
     form.reset();
   } else {
     btn.innerText = "Error";
     btn.classList.add("error");
   }

  } catch(err){
   console.error(err);
   btn.innerText = "Error";
   btn.classList.add("error");
  }

 });

});

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DJICHOOSEYOU Fan Wall</title>

<style>

body{
  background:black;
  margin:0;
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:30px;
  justify-items:center;
}

/* Portrait card frame */

.photo-frame{
  width:220px;
  height:390px;
  border-radius:20px;
  padding:6px;
  background:linear-gradient(135deg,#ffffff,#bbbbbb);
  box-shadow:0 0 25px rgba(255,255,255,0.35);
}

/* Inner portrait container */

.photo-inner{
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:16px;
  background:black;
}

/* Image scaling */

.photo-inner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

</style>

</head>

<body id="wall"></body>

<script>

async function loadWall(){

  const res = await fetch("/approved");
  const photos = await res.json();

  const wall = document.getElementById("wall");
  wall.innerHTML = "";

  photos.slice(-12).forEach(p => {

    const frame = document.createElement("div");
    frame.className="photo-frame";

    const inner = document.createElement("div");
    inner.className="photo-inner";

    const img = document.createElement("img");
    img.src="/approved/"+p+"?"+Date.now();

    inner.appendChild(img);
    frame.appendChild(inner);
    wall.appendChild(frame);

  });

}

setInterval(loadWall,4000);

</script>

</html>

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DJICHOOSEYOU Fan Wall</title>

<style>

body{
  background:black;
  margin:0;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  justify-items:center;
}

.photo-frame{
  width:200px;
  height:355px;
  overflow:hidden;
  border-radius:14px;
  border:4px solid white;
  box-shadow:0 0 20px rgba(255,255,255,0.3);
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
}

.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

</style>

</head>

<body id="wall"></body>

<script>

async function loadWall(){

  const res = await fetch("/approved");
  const photos = await res.json();

  const wall = document.getElementById("wall");
  wall.innerHTML = "";

  photos.slice(-12).forEach(p => {

    const frame = document.createElement("div");
    frame.className = "photo-frame";

    const img = document.createElement("img");
    img.src = "/approved/" + p + "?" + Date.now();

    frame.appendChild(img);
    wall.appendChild(frame);

  });

}

setInterval(loadWall, 4000);

</script>

</html>

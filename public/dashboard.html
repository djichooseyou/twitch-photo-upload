<!DOCTYPE html>
<html>
<head>
  <title>Moderation Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .section {
      margin: 30px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      width: 220px;
    }

    img {
      width: 200px;
      height: auto;
      border-radius: 8px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .approve {
      background: green;
      color: white;
    }

    .delete {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

<h1>📸 Moderation Dashboard</h1>

<div class="section">
  <h2>🕒 Pending</h2>
  <div id="pending" class="grid"></div>
</div>

<div class="section">
  <h2>✅ Approved</h2>
  <div id="approved" class="grid"></div>
</div>

<script>
async function loadImages() {

  // LOAD PENDING
  const pendingRes = await fetch("/pending");
  const pendingFiles = await pendingRes.json();

  const pendingDiv = document.getElementById("pending");
  pendingDiv.innerHTML = "";

pendingFiles.forEach(file => {
  const card = document.createElement("div");
  card.className = "card";

  const encoded = encodeURIComponent(file);

  card.innerHTML = `
    <img src="/pending/${encoded}" />
    <br>
    <button class="approve" onclick="approve('${encoded}')">Approve</button>
    <button class="delete" onclick="deleteImage('pending','${encoded}')">Delete</button>
  `;

  pendingDiv.appendChild(card);
});

  // LOAD APPROVED
  const approvedRes = await fetch("/approved");
  const approvedFiles = await approvedRes.json();

  const approvedDiv = document.getElementById("approved");
  approvedDiv.innerHTML = "";

approvedFiles.forEach(file => {
  const card = document.createElement("div");
  card.className = "card";

  const encoded = encodeURIComponent(file);

  card.innerHTML = `
    <img src="/approved/${encoded}" />
    <br>
    <button class="delete" onclick="deleteImage('approved','${encoded}')">Delete</button>
  `;

  approvedDiv.appendChild(card);
});
}

// APPROVE
function approve(file) {
  fetch(`/approve/${file}`)
    .then(() => loadImages());
}
// DELETE
function deleteImage(folder, file) {
  if (!confirm("Delete this image?")) return;

  fetch(`/delete/${folder}/${file}`, {
    method: "DELETE"
  })
  .then(() => loadImages());
}
// AUTO LOAD
loadImages();

// AUTO REFRESH EVERY 5 SECONDS
setInterval(loadImages, 5000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Moderation Dashboard</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

#container{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  background:#111;
  padding:15px;
  margin:15px;
  border-radius:10px;
  transition: border 0.4s ease;
}

img{
  width:200px;
  display:block;
  margin-bottom:10px;
}

button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:14px;
}

.approve{
  background:green;
  color:white;
}

.decline{
  background:red;
  color:white;
}
</style>

</head>

<body>

<h1>Moderation Dashboard</h1>

<div id="container"></div>

<script>

const API_BASE = "https://twitch-photo-upload.onrender.com";
const seen = new Set();

async function loadDashboard(){

  const container = document.getElementById("container");

  try {

    const res = await fetch(API_BASE + "/pending");
    const files = await res.json();

    console.log("Loaded photos:", files);

    // Clean up seen set
    seen.forEach(file => {
      if (!files.includes(file)) {
        seen.delete(file);
      }
    });

    files
      .filter(file => file.match(/\.(jpg|jpeg|png|gif|webp)$/i))
      .forEach(file => {

        if (seen.has(file)) return;
        seen.add(file);

        const card = document.createElement("div");
        card.className = "card";

        // Glow effect for new items
        card.style.boxShadow = "0 0 25px lime";
        card.style.transition = "box-shadow 0.6s ease";

        setTimeout(() => {
          card.style.boxShadow = "0 0 0px transparent";
        }, 1500);

        // Image
        const img = document.createElement("img");
        img.src = API_BASE + "/pending/" + file;

        // APPROVE BUTTON
        const approveBtn = document.createElement("button");
        approveBtn.innerText = "Approve";
        approveBtn.className = "approve";

        approveBtn.onclick = async () => {

          const res = await fetch(
            API_BASE + "/approve/" + file,
            { method: "POST" }
          );

          if(res.ok){

            card.style.opacity = "0";
            card.style.transform = "scale(0.9)";
            card.style.transition = "all 0.3s ease";

            setTimeout(() => {
              card.remove();
              seen.delete(file);
            }, 300);

          } else {
            alert("Approve failed");
          }

        };

        // DECLINE BUTTON
        const declineBtn = document.createElement("button");
        declineBtn.innerText = "Decline";
        declineBtn.className = "decline";

        declineBtn.onclick = async () => {

          if(!confirm("Delete this photo?")) return;

          const res = await fetch(
            API_BASE + "/delete/" + file,
            { method: "DELETE" }
          );

          if(res.ok){

            card.style.opacity = "0";
            card.style.transform = "scale(0.9)";
            card.style.transition = "all 0.3s ease";

            setTimeout(() => {
              card.remove();
              seen.delete(file);
            }, 300);

          } else {
            alert("Delete failed");
          }

        };

        card.appendChild(img);
        card.appendChild(approveBtn);
        card.appendChild(declineBtn);

        container.prepend(card);

      });

  } catch(err){
    console.error("Dashboard error:", err);
  }

}

// Auto refresh every 5 seconds
setInterval(loadDashboard, 5000);

// Initial load
loadDashboard();

</script>

</body>

</html>

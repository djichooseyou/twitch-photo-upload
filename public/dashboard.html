<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

#container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

img{
  width:200px;
  margin:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h1>Dashboard</h1>

<div id="container"></div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

  const API_BASE = "https://twitch-photo-upload.onrender.com";
  const container = document.getElementById("container");

  try {

    const res = await fetch(API_BASE + "/approved");
    const files = await res.json();

    console.log("FILES:", files); // 👈 DEBUG

    if (!files.length) {
      container.innerHTML = "<p>No images found</p>";
      return;
    }

    files.forEach(file => {

      // 🔥 ONLY allow real image files
      if (!file.match(/\.(jpg|jpeg|png|gif|webp)$/i)) return;

      const img = document.createElement("img");
      img.src = API_BASE + "/approved/" + file;

      container.appendChild(img);

    });

  } catch (err){
    console.error("Dashboard error:", err);
    container.innerHTML = "<p>Error loading images</p>";
  }

});

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

#container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#111;
  padding:15px;
  margin:15px;
  border-radius:10px;
}

img{
  width:200px;
  display:block;
  margin-bottom:10px;
}

button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.approve{
  background:green;
  color:white;
}

.decline{
  background:red;
  color:white;
}
</style>

</head>

<body>

<h1>Moderation Dashboard</h1>

<div id="container"></div>

<script>

const API_BASE = "https://twitch-photo-upload.onrender.com";

async function loadDashboard(){

  const container = document.getElementById("container");
  container.innerHTML = "";

  const res = await fetch(API_BASE + "/pending");
  const files = await res.json();

  files
    .filter(file => file.match(/\.(jpg|jpeg|png|gif|webp)$/i))
    .forEach(file => {

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = API_BASE + "/pending/" + encodeURIComponent(file);

      const approveBtn = document.createElement("button");
      approveBtn.innerText = "Approve";
      approveBtn.className = "approve";

      approveBtn.onclick = async () => {
        await fetch(API_BASE + "/approve/" + file, { method: "POST" });
        loadDashboard();
      };

      const declineBtn = document.createElement("button");
      declineBtn.innerText = "Decline";
      declineBtn.className = "decline";

      declineBtn.onclick = () => {
        alert("Decline logic not implemented yet");
      };

      card.appendChild(img);
      card.appendChild(approveBtn);
      card.appendChild(declineBtn);

      container.appendChild(card);

    });

}

loadDashboard();

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    #photos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .card {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .5);
    }

    img {
      max-width: 200px;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      margin-right: 8px;
      border: none;
      padding: 10px 18px;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .approve {
      background: #00cc66;
    }

    .approve:hover {
      background: #00aa55;
    }

    .delete {
      background: #cc3333;
    }

    .delete:hover {
      background: #aa2222;
    }
  </style>
</head>

<body>

  <h2>Pending Photos</h2>
  <div id="photos"></div>

  <script>
    const API_BASE = ""; 
    // 👉 If using Render, replace with:
    // const API_BASE = "https://your-backend.onrender.com";

    async function loadPhotos() {
      try {
        const res = await fetch(`${API_BASE}/pending`);
        const photos = await res.json();

        console.log("Loaded photos:", photos);

        const container = document.getElementById("photos");
        container.innerHTML = "";

        if (!Array.isArray(photos)) {
          console.error("Invalid response:", photos);
          return;
        }

        photos.forEach(file => {

          if (!file || typeof file !== "string") return;

          const safeFile = encodeURIComponent(file);

          const card = document.createElement("div");
          card.className = "card";

          const img = document.createElement("img");
          img.src = `${API_BASE}/pending/${safeFile}`;

          // ✅ APPROVE BUTTON
          const approveBtn = document.createElement("button");
          approveBtn.className = "approve";
          approveBtn.innerText = "Approve";

          approveBtn.onclick = async () => {
            try {
              const response = await fetch(`${API_BASE}/approve/${safeFile}`, {
                method: "POST"
              });

              if (response.ok) {
                loadPhotos();
              } else {
                alert("Approval failed");
              }
            } catch (err) {
              console.error(err);
              alert("Error approving photo");
            }
          };

          // ❌ DELETE BUTTON
          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete";
          deleteBtn.innerText = "Delete";

          deleteBtn.onclick = async () => {
            try {
              const response = await fetch(`${API_BASE}/delete/${safeFile}`, {
                method: "DELETE"
              });

              if (response.ok) {
                loadPhotos();
              } else {
                alert("Delete failed");
              }
            } catch (err) {
              console.error(err);
              alert("Error deleting photo");
            }
          };

          card.appendChild(img);
          card.appendChild(approveBtn);
          card.appendChild(deleteBtn);

          container.appendChild(card);

        });

      } catch (err) {
        console.error("Load error:", err);
      }
    }

    // 🔁 Auto refresh every 5 seconds
    setInterval(loadPhotos, 5000);

    // 🚀 Initial load
    loadPhotos();
  </script>

</body>

</html>
